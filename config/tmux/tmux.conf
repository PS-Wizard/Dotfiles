##### Terminal Settings #####
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:extkeys'
set -g allow-passthrough on
set -ag terminal-overrides ",xterm-256color:RGB"
set -s extended-keys always
set -g extended-keys-format csi-u


set -s escape-time 0
##### Prefix Key #####
unbind C-b
set -g prefix C-s
bind C-s send-prefix
##### Pane & Window Bindings #####
bind n new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind g run-shell "cd #{pane_current_path} && ~/.config/tmux/github.sh"
bind c new-window -c "#{pane_current_path}" "~/.config/tmux/cht.sh"


bind -n M-Space display-popup -E "~/.config/tmux/sessions.sh"
bind S command-prompt -p "session name (blank = auto):" "run-shell '~/.config/tmux/new-session.sh \"%%\"'"

##### Window Navigation (Alt + number) #####
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-5
unbind -n M-6
unbind -n M-7
unbind -n M-8
unbind -n M-9
unbind -n M-0
bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3
bind -n M-5 select-window -t 4
bind -n M-6 select-window -t 5
bind -n M-7 select-window -t 6
bind -n M-8 select-window -t 7
bind -n M-9 select-window -t 8
bind -n M-0 select-window -t 9

#### Hide Tmux Statusbar ####
bind -n M-p set -g status
##### Mouse Support #####
set -g mouse on
##### Status Bar #####
set -g status-style bg=default,fg=#908caa
set -g status-left ""
set -g status-right ""
set -g status-justify right
# Window status
set -g window-status-format "#[fg=#6e6a86] #W"
set -g window-status-current-format "#[fg=#f6c177,bold] #W "
set -g window-status-style bg=default,fg=#908caa
set -g window-status-current-style bg=default,fg=#e0def4
# Pane borders
set -g pane-border-style fg=#26233a
set -g pane-active-border-style fg=#31748f
set -g renumber-windows on
set -g pane-border-lines simple
##### Reload Config #####
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
##### Copy Mode (Vim-style) #####
setw -g mode-keys vi
unbind -T copy-mode-vi C-h
unbind -T copy-mode-vi C-j
unbind -T copy-mode-vi C-k
unbind -T copy-mode-vi C-l
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
set-option -g status-position bottom

##### Prefix-based Window Merge & Break #####
bind m switch-client -Tmerge
bind Space break-pane
bind -Tmerge n join-pane -h -t :+ \; switch-client -Troot
bind -Tmerge p join-pane -h -t :- \; switch-client -Troot



#### Window Reorder (Alt+Shift+H/L) #####
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1
##### Alt + Vim-style Pane Navigation #####
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-f if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' 'resize-pane -Z'

# Terminal passthrough for modified keys some apps need inside tmux.
# S-Enter is not a distinct key in most terminals, but CSI-u / extkeys lets apps
# receive Ctrl/Alt/other modified keys reliably when the terminal supports them.
set -g user-keys[0] "User0"
bind-key -n User0 send-keys User0
