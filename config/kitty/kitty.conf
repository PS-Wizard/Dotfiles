# Font settings
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.5
# Emoji fallback font
symbol_map U+1F300-U+1F9FF Noto Color Emoji
# Line height
adjust_line_height 16
# Enable ligatures
disable_ligatures never
# Use thinner font rendering
text_composition_strategy legacy
# Cursor settings
cursor_shape block
cursor_blink_interval 0
cursor_trail 2
cursor_trail_decay 0.1 0.4
shell_integration no-cursor
# Window settings
window_padding_width 0 5 0 5
hide_window_decorations yes
# Scrollback
scrollback_lines 100
scrollback_pager_history_size 0
# Mouse
mouse_hide_wait 1.0
hide_mouse_when_typing yes
# Disable bell
enable_audio_bell no
visual_bell_duration 0.0
# Disable close confirmation
confirm_os_window_close 0
paste_actions no-op
clipboard_control write-clipboard write-primary read-clipboard read-primary
# Background opacity
background_opacity 1
# foreground #c0b196
# background #10171e
# Cursor colors
# cursor #c0b196
# cursor_text_color #131a21
# Selection
# selection_foreground #c0b196
