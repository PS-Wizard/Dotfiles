# Font settings
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.5

# Emoji fallback font
symbol_map U+1F300-U+1F9FF Noto Color Emoji

# Line height
adjust_line_height 16
# Enable ligatures
disable_ligatures never
# Use thinner font rendering
text_composition_strategy legacy
# Cursor settings
cursor_shape block
cursor_blink_interval 0
cursor_trail 2
cursor_trail_decay 0.1 0.4
shell_integration no-cursor
# Window settings
window_padding_width 0 5 0 5
hide_window_decorations yes
# Scrollback
scrollback_lines 100
scrollback_pager_history_size 0
# Mouse
mouse_hide_wait 1.0
hide_mouse_when_typing yes
# Disable bell
enable_audio_bell no
visual_bell_duration 0.0
# Disable close confirmation
confirm_os_window_close 0
paste_actions no-op
clipboard_control write-clipboard write-primary read-clipboard read-primary
# Background opacity
# Gruvchad-inspired backdrop
background_opacity 0.85
foreground #c0b196
background #000000
# Cursor colors
cursor #e0def4
cursor_text_color #101218

# Selection
selection_foreground #c0b196
selection_background #2c2f30

# Black
color0 #1e2122
color8 #404344

# Red
color1 #ec6b64
color9 #ec6b64

# Green
color2 #a9b665
color10 #a9b665

# Yellow
color3 #e0c080
color11 #e0c080

# Blue
color4 #7daea3
color12 #7daea3

# Magenta
color5 #d3869b
color13 #d3869b

# Cyan
color6 #86b17f
color14 #86b17f

# White
color7 #c0b196
color15 #c7b89d
