# Best-effort port from ~/.config/sway/config

repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us
xkb_rules_options=caps:ctrl_modifier

tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1

monitorrule=name:^eDP-2$,x:0,y:0,scale:1

gappih=0
gappiv=0
gappoh=0
gappov=0
borderpx=1
border_radius=0
no_border_when_single=1
smartgaps=1
rootcolor=0x111111ff
bordercolor=0x2f2f2fff
focuscolor=0x8a8a8aff
urgentcolor=0xaa3333ff
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

blur=0
blur_layer=0
shadows=0
layer_shadows=0
focused_opacity=1.0
unfocused_opacity=1.0
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
animation_duration_move=120
animation_duration_open=100
animation_duration_tag=0
animation_duration_close=140
animation_duration_focus=0

sloppyfocus=1
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
axis_bind_apply_timeout=100

scroller_structs=0
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

dwindle_split_ratio=0.5
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

circle_layout=dwindle,vertical_scroller,scroller

tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

windowrule=isfloating:1,appid:firefox$,title:^Picture-in-Picture$
layerrule=noanim:1,noblur:1,layer_name:selection

exec=sh -c 'command -v swaybg >/dev/null 2>&1 && { pkill swaybg; swaybg -o "*" -i "/home/wizard/.config/mango/wallpaper.jpg" -m fill; }'
exec=sh -c 'command -v waybar >/dev/null 2>&1 && { pkill waybar; waybar -c /home/wizard/.config/waybar/config.json -s /home/wizard/.config/waybar/style.css; }'
exec-once=sh -c 'command -v kanata >/dev/null 2>&1 && kanata -c /home/wizard/.config/kanata/config.kbd'
exec-once=sh -c 'command -v trash-empty >/dev/null 2>&1 && trash-empty -f 10'
exec-once=sh -c 'command -v brightnessctl >/dev/null 2>&1 && brightnessctl s 0'
exec-once=sh -c 'test -x /usr/lib/xdg-desktop-portal-wlr && /usr/lib/xdg-desktop-portal-wlr'

bind=SUPER,Return,spawn,kitty
bind=SUPER,d,spawn,bemenu-run -b --binding vim
bind=SUPER,p,spawn,pkill -SIGUSR1 waybar
bind=SUPER+SHIFT,q,killclient
bind=SUPER+SHIFT,Return,quit
bind=SUPER,f,togglefullscreen
bind=SUPER,space,spawn,/home/wizard/.config/mango/switch-layout
bind=SUPER,Tab,view,-1,0
bind=SUPER,u,viewtoleft,0
bind=SUPER,i,viewtoright,0
bind=SUPER+SHIFT,p,disable_monitor,eDP-2
bind=ALT,w,spawn,wlr-which-key
bind=ALT+SHIFT,w,spawn_shell,pkill wayscriber; wayscriber --active --mode whiteboard

bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

bind=SUPER+CTRL,h,focusmon,left
bind=SUPER+CTRL,j,focusmon,down
bind=SUPER+CTRL,k,focusmon,up
bind=SUPER+CTRL,l,focusmon,right

bind=SUPER+SHIFT+CTRL,h,tagmon,left,1
bind=SUPER+SHIFT+CTRL,j,tagmon,down,1
bind=SUPER+SHIFT+CTRL,k,tagmon,up,1
bind=SUPER+SHIFT+CTRL,l,tagmon,right,1

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,spawn,/home/wizard/.config/mango/move-to-tag 1
bind=SUPER+SHIFT,2,spawn,/home/wizard/.config/mango/move-to-tag 2
bind=SUPER+SHIFT,3,spawn,/home/wizard/.config/mango/move-to-tag 3
bind=SUPER+SHIFT,4,spawn,/home/wizard/.config/mango/move-to-tag 4
bind=SUPER+SHIFT,5,spawn,/home/wizard/.config/mango/move-to-tag 5
bind=SUPER+SHIFT,6,spawn,/home/wizard/.config/mango/move-to-tag 6
bind=SUPER+SHIFT,7,spawn,/home/wizard/.config/mango/move-to-tag 7
bind=SUPER+SHIFT,8,spawn,/home/wizard/.config/mango/move-to-tag 8
bind=SUPER+SHIFT,9,spawn,/home/wizard/.config/mango/move-to-tag 9

bind=SUPER,s,toggle_scratchpad
bind=SUPER+SHIFT,s,minimized
bind=SUPER,m,togglemaximizescreen
bind=SUPER,c,focuslast

bind=SUPER,minus,spawn,/home/wizard/.config/mango/resize-scroller -0.1
bind=SUPER,equal,spawn,/home/wizard/.config/mango/resize-scroller +0.1
bind=SUPER+SHIFT,minus,incnmaster,-1
bind=SUPER+SHIFT,equal,incnmaster,+1

axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 10%-
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous

bind=SUPER,y,spawn,/home/wizard/.config/mango/screenshot.sh
